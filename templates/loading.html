<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="refresh" content="15" />
  <title>Preparando o Diário de Hoje…</title>
  <link href="https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    body {
      background: #b5a48a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Playfair Display', Georgia, serif;
      color: #1a1505;
    }
    .folha {
      background: #f8f3e2;
      border: 1px solid #7a6a4a;
      padding: 52px 64px;
      text-align: center;
      box-shadow: 6px 8px 32px rgba(0,0,0,0.35);
      max-width: 480px;
    }
    .titulo {
      font-family: 'UnifrakturMaguntia', serif;
      font-size: 3rem;
      margin-bottom: 8px;
    }
    .regra { height: 3px; background: #0d0b05; margin: 16px 0; border: none; }
    .mensagem {
      font-size: 1rem;
      line-height: 1.7;
      color: #3a3020;
      margin-bottom: 24px;
    }
    .tempo {
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #7a6a4a;
      border-top: 1px solid #7a6a4a;
      padding-top: 14px;
    }
    .dots { animation: pisca 1.2s infinite; }
    @keyframes pisca { 0%,100%{opacity:1} 50%{opacity:0.3} }
  </style>
</head>
<body>
  <div class="folha">
    <div class="titulo">Diário de Hoje</div>
    <hr class="regra" />
    <p class="mensagem">
      Estamos consultando os grandes jornais e preparando a edição de hoje.<br>
      Esta página se atualiza automaticamente.
    </p>
    <p class="dots">— aguardando —</p>
    <p class="tempo">A edição estará pronta em instantes</p>
  </div>
</body>
</html>
